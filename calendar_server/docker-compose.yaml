services:
  # Development services
  postgres:
    image: postgres:16.3
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: calendar
      POSTGRES_PASSWORD: "MYqHQvd0HqlDGbvrLWOT3YJMKzgTS8hg"
    volumes:
      - calendar_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "j8DmKLe6rH0zK2fsB0tA-stmemAzglTI"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: postgres:16.3
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: calendar_test
      POSTGRES_PASSWORD: "aLIUGrimrHyn8lBpCv82YSxsBn2z2GzP"
    volumes:
      - calendar_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "7nPnVcIIHgNvFugjdt1LFZcRYz_vkDrm"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  calendar_data:
  calendar_test_data:
